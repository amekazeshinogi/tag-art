<!DOCTYPE html>
<html>
<head>

<title>🎨 アイコン生成AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Helvetica Neue', sans-serif;
  background: #f0f2f5;
  color: #333;
  padding-bottom: 40px;
}

header {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 20px;
  text-align: center;
}

header h1 { font-size: 24px; margin-bottom: 5px; }
header p { font-size: 13px; opacity: 0.85; }

.container {
  max-width: 620px;
  margin: 20px auto;
  padding: 0 15px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card h3 {
  font-size: 14px;
  color: #888;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.tag-btn {
  margin: 4px;
  padding: 8px 14px;
  border: 1.5px solid #ddd;
  border-radius: 20px;
  background: white;
  color: #333;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}

.tag-btn:hover {
  border-color: #764ba2;
  color: #764ba2;
}

.tag-btn.selected {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border-color: transparent;
}

.selected-area {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  min-height: 60px;
}

.selected-area h3 {
  font-size: 14px;
  color: #888;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.tag {
  display: inline-block;
  background: #f0f2f5;
  color: #333;
  padding: 6px 12px;
  margin: 3px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.tag:hover { background: #fde8e8; color: #e44; }

#countText {
  text-align: center;
  color: #764ba2;
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 10px;
}

.btn-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

#reset-btn {
  flex: 1;
  padding: 14px;
  background: #f0f2f5;
  color: #666;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
}

#generate-btn {
  flex: 2;
  padding: 14px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

#generate-btn:hover { opacity: 0.9; }

#loading {
  display: none;
  text-align: center;
  padding: 30px;
  color: #888;
  font-size: 15px;
}

.result-card {
  display: none;
  background: white;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

#img {
  width: 256px;
  height: 256px;
  border-radius: 12px;
  display: block;
  margin: 0 auto 15px;
}

#save-btn {
  display: none;
  padding: 12px 30px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  width: 100%;
}

</style>
</head>
<body>

<header>
  <h1>🎨 アイコン生成AI</h1>
  <p>タグを選んでオリジナルアイコンを作ろう</p>
</header>

<div class="container">

<div class="card">
<h3>👤 性別</h3>
<button class="tag-btn" onclick="addTag('boy')">男性</button>
<button class="tag-btn" onclick="addTag('girl')">女性</button>
<button class="tag-btn" onclick="addTag('neutral')">中性</button>
</div>

<div class="card">
<h3>💇 髪型</h3>
<button class="tag-btn" onclick="addTag('short hair')">ショート</button>
<button class="tag-btn" onclick="addTag('long hair')">ロング</button>
<button class="tag-btn" onclick="addTag('twin tails')">ツインテール</button>
<button class="tag-btn" onclick="addTag('ponytail')">ポニーテール</button>
<button class="tag-btn" onclick="addTag('bob cut')">ボブ</button>
<button class="tag-btn" onclick="addTag('wavy hair')">ウェーブ</button>
<button class="tag-btn" onclick="addTag('curly hair')">くるくる</button>
</div>

<div class="card">
<h3>🎨 髪色</h3>
<button class="tag-btn" onclick="addTag('blonde hair')">金髪</button>
<button class="tag-btn" onclick="addTag('black hair')">黒髪</button>
<button class="tag-btn" onclick="addTag('brown hair')">茶髪</button>
<button class="tag-btn" onclick="addTag('white hair')">白髪</button>
<button class="tag-btn" onclick="addTag('pink hair')">ピンク</button>
<button class="tag-btn" onclick="addTag('blue hair')">ブルー</button>
<button class="tag-btn" onclick="addTag('silver hair')">シルバー</button>
</div>

<div class="card">
<h3>😊 表情</h3>
<button class="tag-btn" onclick="addTag('smile')">笑顔</button>
<button class="tag-btn" onclick="addTag('serious')">真剣</button>
<button class="tag-btn" onclick="addTag('wink')">ウィンク</button>
<button class="tag-btn" onclick="addTag('surprised')">驚き</button>
<button class="tag-btn" onclick="addTag('cool expression')">クール</button>
<button class="tag-btn" onclick="addTag('happy')">嬉しい</button>
</div>

<div class="card">
<h3>👁️ 目</h3>
<button class="tag-btn" onclick="addTag('big eyes')">大きい目</button>
<button class="tag-btn" onclick="addTag('blue eyes')">青い目</button>
<button class="tag-btn" onclick="addTag('red eyes')">赤い目</button>
<button class="tag-btn" onclick="addTag('green eyes')">緑の目</button>
<button class="tag-btn" onclick="addTag('heterochromia')">オッドアイ</button>
</div>

<div class="card">
<h3>👗 服装</h3>
<button class="tag-btn" onclick="addTag('school uniform')">制服</button>
<button class="tag-btn" onclick="addTag('casual clothes')">カジュアル</button>
<button class="tag-btn" onclick="addTag('suit')">スーツ</button>
<button class="tag-btn" onclick="addTag('kimono')">着物</button>
<button class="tag-btn" onclick="addTag('hoodie')">パーカー</button>
<button class="tag-btn" onclick="addTag('maid outfit')">メイド服</button>
</div>

<div class="card">
<h3>✨ 属性</h3>
<button class="tag-btn" onclick="addTag('cat ears')">猫耳</button>
<button class="tag-btn" onclick="addTag('fox ears')">狐耳</button>
<button class="tag-btn" onclick="addTag('angel wings')">天使</button>
<button class="tag-btn" onclick="addTag('demon horns')">悪魔</button>
<button class="tag-btn" onclick="addTag('elf ears')">エルフ</button>
<button class="tag-btn" onclick="addTag('dragon')">ドラゴン</button>
</div>

<div class="card">
<h3>👓 アクセサリー</h3>
<button class="tag-btn" onclick="addTag('glasses')">メガネ</button>
<button class="tag-btn" onclick="addTag('hat')">帽子</button>
<button class="tag-btn" onclick="addTag('earrings')">ピアス</button>
<button class="tag-btn" onclick="addTag('headband')">カチューシャ</button>
<button class="tag-btn" onclick="addTag('ribbon')">リボン</button>
<button class="tag-btn" onclick="addTag('mask')">マスク</button>
</div>

<div class="card">
<h3>🌍 背景・世界観</h3>
<button class="tag-btn" onclick="addTag('fantasy background')">ファンタジー</button>
<button class="tag-btn" onclick="addTag('cyberpunk background')">サイバーパンク</button>
<button class="tag-btn" onclick="addTag('nature background')">自然</button>
<button class="tag-btn" onclick="addTag('white background')">白背景</button>
<button class="tag-btn" onclick="addTag('gradient background')">グラデーション</button>
</div>

<div class="card">
<h3>🎨 スタイル</h3>
<button class="tag-btn" onclick="setStyle(this,'cute icon')">かわいい</button>
<button class="tag-btn" onclick="setStyle(this,'simple flat icon')">シンプル</button>
<button class="tag-btn" onclick="setStyle(this,'soft illustration')">ゆるい</button>
<button class="tag-btn" onclick="setStyle(this,'business avatar')">ビジネス</button>
<button class="tag-btn" onclick="setStyle(this,'pixel art')">ドット絵</button>
<button class="tag-btn" onclick="setStyle(this,'anime style')">アニメ</button>
<button class="tag-btn" onclick="setStyle(this,'realistic')">リアル</button>
</div>

<div class="selected-area">
<h3>選択中タグ（タップで削除）</h3>
<div id="tagList"><span style="color:#aaa;font-size:13px">タグを選んでください</span></div>
<p style="margin-top:8px;font-size:13px;color:#888" id="styleText">スタイル: 未選択</p>
</div>

<p id="countText">本日の残り回数：3回</p>

<div class="btn-row">
<button id="reset-btn" onclick="resetTags()">🔄 リセット</button>
<button id="generate-btn" onclick="generate()">✨ 生成する</button>
</div>

<div id="loading">⏳ 生成中...（20〜30秒かかります）</div>

<div class="result-card" id="resultCard">
<img id="img">
<button id="save-btn" onclick="saveImage()">💾 画像を保存する</button>
</div>

</div>

<script>

let tags = [];
let style = "";

function addTag(tag){
  tags.push(tag);
  showTags();
}

function removeTag(index){
  tags.splice(index,1);
  showTags();
}

function showTags(){
  let html="";
  for(let i=0;i<tags.length;i++){
    html += '<span class="tag" onclick="removeTag('+i+')">'
      + tags[i] + ' ×</span>';
  }
  document.getElementById("tagList").innerHTML =
    html || '<span style="color:#aaa;font-size:13px">タグを選んでください</span>';
}

function resetTags(){
  tags=[];
  style="";
  showTags();
  document.getElementById("styleText").innerText="スタイル: 未選択";
  let btns = document.querySelectorAll(".tag-btn");
  btns.forEach(b => b.classList.remove("selected"));
  document.getElementById("resultCard").style.display="none";
  document.getElementById("loading").style.display="none";
  document.getElementById("save-btn").style.display="none";
}

function setStyle(btn, s){
  style = s;
  document.getElementById("styleText").innerText = "スタイル: " + style;
  let btns = document.querySelectorAll(".tag-btn");
  btns.forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}

function saveImage(){
  let img = document.getElementById("img");
  let a = document.createElement("a");
  a.href = img.src;
  a.download = "icon.jpg";
  a.click();
}

function generate(){

  let today = new Date().toDateString();
  let data = JSON.parse(localStorage.getItem("genData") || '{"date":"","count":0}');

  if(data.date !== today){
    data = { date: today, count: 0 };
  }

  let limit = 3;

  if(data.count >= limit){
    alert("本日の無料生成回数（" + limit + "回）を超えました。\n有料プランにアップグレードしてください。");
    return;
  }

  if(tags.length === 0 && style === ""){
    alert("タグまたはスタイルを選択してください");
    return;
  }

  data.count++;
  localStorage.setItem("genData", JSON.stringify(data));

  let remaining = limit - data.count;
  document.getElementById("countText").innerText =
    "本日の残り回数：" + remaining + "回";

  let prompt = tags.join(", ");

  let url =
    "https://imagi-api.amekaze-shinogin.workers.dev/?prompt="
    + encodeURIComponent(prompt)
    + "&style="
    + encodeURIComponent(style);

  document.getElementById("loading").style.display="block";
  document.getElementById("resultCard").style.display="none";

  let img = document.getElementById("img");
  img.onload = function(){
    document.getElementById("loading").style.display="none";
    document.getElementById("resultCard").style.display="block";
    document.getElementById("save-btn").style.display="block";
  };
  img.onerror = function(){
    document.getElementById("loading").style.display="none";
    alert("生成に失敗しました。もう一度お試しください。");
  };
  img.src = url;
}

</script>

</body>
</html>
