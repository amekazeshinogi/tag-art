<!DOCTYPE html>
<html>
<head>

<title>AI画像生成</title>

<style>

button {
margin:5px;
padding:10px;
}

img {
margin-top:20px;
width:300px;
}

</style>

</head>
<body>

<h2>AI画像生成</h2>

<button onclick="addTag('anime girl')">女の子</button>
<button onclick="addTag('cat ears')">猫耳</button>
<button onclick="addTag('blonde hair')">金髪</button>
<button onclick="addTag('fantasy')">ファンタジー</button>

<br><br>

<button onclick="generate()">生成</button>

<p id="tags"></p>

<img id="img">

<script>

let tags = [];

function addTag(tag) {

tags.push(tag);

document.getElementById("tags").innerText =
tags.join(", ");

}

function generate() {

let prompt = tags.join(", ");

alert("生成: " + prompt);

let url =
"https://imagi-api.amekaze-shinogin.workers.dev/?prompt="
+ encodeURIComponent(prompt);

document.getElementById("img").src = url;

}

</script>

</body>
</html>
