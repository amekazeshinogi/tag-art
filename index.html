<!DOCTYPE html>
<html>
<head>

<title>アイコン生成AI</title>

<style>

button {
margin:5px;
padding:10px;
}

img {
width:256px;
height:256px;
margin-top:20px;
}

</style>

</head>
<body>

<h2>アイコン生成AI</h2>

<h3>タグ</h3>

<button onclick="addTag('boy')">男</button>
<button onclick="addTag('girl')">女</button>
<button onclick="addTag('glasses')">メガネ</button>
<button onclick="addTag('smile')">笑顔</button>

<h3>スタイル</h3>

<button onclick="setStyle('cute icon')">かわいい</button>
<button onclick="setStyle('simple flat icon')">シンプル</button>
<button onclick="setStyle('soft illustration')">ゆるい</button>
<button onclick="setStyle('business avatar')">ビジネス</button>
<button onclick="setStyle('pixel art icon')">ドット</button>

<br><br>

<button onclick="generate()">生成</button>

<p id="tags"></p>
<p id="style"></p>

<img id="img">

<script>

let tags = [];
let style = "";

function addTag(tag){

tags.push(tag);

document.getElementById("tags").innerText =
"タグ: " + tags.join(", ");

}

function setStyle(s){

style = s;

document.getElementById("style").innerText =
"スタイル: " + style;

}

function generate(){

let prompt = tags.join(", ");

let url =
"https://imagi-api.amekaze-shinogin.workers.dev/?prompt="
+ encodeURIComponent(prompt + ", " + style);

document.getElementById("img").src = url;

}

</script>

</body>
</html>
