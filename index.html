.tag-btn {

}

}

.selected-tag {
  display: inline-block; background: #eee;
  padding: 4px 10px; margin: 3px;
  border-radius: 20px; cursor: pointer;
  font-size: 14px;
}
.selected-tag:after { content: " ×"; color: red; }
#generate-btn {
  margin-top: 15px; padding: 12px 30px;
  background: #ff5722; color: white;
  border: none; border-radius: 8px;
  font-size: 16px; cursor: pointer;
}
img { width: 256px; height: 256px; margin-top: 20px; display: block; border-radius: 12px; }
#loading { display: none; margin-top: 20px; font-size: 16px; color: #888; }
</style>
</head>
