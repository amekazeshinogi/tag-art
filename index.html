<!DOCTYPE html>
<html>
<head>
<title>AI画像生成サイト</title>

<style>

button {
  margin: 5px;
  padding: 10px;
}

#result {
  margin-top: 20px;
  font-size: 18px;
}

#prompt {
  margin-top: 20px;
  color: blue;
}

</style>

</head>
<body>

<h1>AI画像生成サイト</h1>

<h3>タグを選んでください</h3>

<button onclick="addTag('cat ears')">猫耳</button>
<button onclick="addTag('blonde hair')">金髪</button>
<button onclick="addTag('black hair')">黒髪</button>
<button onclick="addTag('fantasy')">ファンタジー</button>
<button onclick="addTag('cyberpunk')">サイバー</button>

<br><br>

<button onclick="makePrompt()">生成</button>

<div id="result">
選択:
</div>

<div id="prompt">
プロンプト:
</div>

<script>

let tags = [];

function addTag(tag) {

tags.push(tag);

document.getElementById("result").innerText =
"選択: " + tags.join(" ");

}

function makePrompt() {

let prompt = tags.join(", ") + ", anime style, masterpiece";

document.getElementById("prompt").innerText =
"プロンプト: " + prompt;

}

</script>

</body>
</html>
