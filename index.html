<!DOCTYPE html>
<html>
<head>

<title>アイコン生成AI</title>

<style>

button {
margin:4px;
padding:8px;
}

.category {
margin-top:10px;
}

.tag {
background:#ddd;
display:inline-block;
padding:5px;
margin:3px;
cursor:pointer;
}

img {
width:256px;
height:256px;
margin-top:20px;
}

</style>

</head>
<body>

<h2>アイコン生成AI</h2>

<div class="category">
<h3>性別</h3>

<button onclick="addTag('boy')">男</button>
<button onclick="addTag('girl')">女</button>

</div>


<div class="category">
<h3>表情</h3>

<button onclick="addTag('smile')">笑顔</button>
<button onclick="addTag('angry')">怒り</button>
<button onclick="addTag('sad')">悲しい</button>

</div>


<div class="category">
<h3>アクセ</h3>

<button onclick="addTag('glasses')">メガネ</button>
<button onclick="addTag('hat')">帽子</button>
<button onclick="addTag('earrings')">ピアス</button>

</div>


<div class="category">
<h3>スタイル</h3>

<button onclick="setStyle('cute icon')">かわいい</button>
<button onclick="setStyle('simple flat icon')">シンプル</button>
<button onclick="setStyle('soft illustration')">ゆるい</button>
<button onclick="setStyle('business avatar')">ビジネス</button>

</div>


<h3>選択タグ（クリックで削除）</h3>

<div id="tagList"></div>

<br>

<button onclick="resetTags()">リセット</button>
<button onclick="generate()">生成</button>

<br>

<img id="img">

<script>

let tags = [];
let style = "";

function addTag(tag){

tags.push(tag);
showTags();

}

function removeTag(index){

tags.splice(index,1);
showTags();

}

function showTags(){

let html="";

for(let i=0;i<tags.length;i++){

html +=
'<span class="tag" onclick="removeTag('+i+')">'
+ tags[i] +
'</span>';

}

document.getElementById("tagList").innerHTML = html;

}

function resetTags(){

tags=[];
showTags();

}

function setStyle(s){

style = s;

}

function generate(){

let prompt = tags.join(", ") + ", " + style;

let url =
"https://imagi-api.amekaze-shinogin.workers.dev/?prompt="
+ encodeURIComponent(prompt);

document.getElementById("img").src = url;

}

</script>

</body>
</html>
