<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tag-art</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #667eea;
      --primary-dark: #764ba2;
      --accent: #ff9800;
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #333;
      --text-muted: #999;
      --border: #e0e4ed;
      --shadow: 0 2px 12px rgba(102,126,234,0.10);
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== ヘッダー ===== */
    .header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(102,126,234,0.3);
    }
    .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .header h1 span { opacity: 0.7; font-weight: 400; font-size: 13px; margin-left: 6px; }

    .auth-area { display: flex; align-items: center; gap: 8px; }
    .auth-area input {
      padding: 6px 10px; border-radius: 8px; border: none;
      font-size: 12px; background: rgba(255,255,255,0.2); color: white;
      width: 110px;
    }
    .auth-area input::placeholder { color: rgba(255,255,255,0.6); }
    .auth-area button {
      padding: 6px 12px; border-radius: 8px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      background: rgba(255,255,255,0.25); color: white;
      transition: background 0.2s;
    }
    .auth-area button:hover { background: rgba(255,255,255,0.4); }
    #userInfo { font-size: 12px; opacity: 0.85; }

    /* ===== メインコンテナ ===== */
    .main-container { max-width: 900px; margin: 0 auto; padding: 16px; }

    /* ===== モード切替 ===== */
    .mode-tabs {
      display: flex; gap: 8px; margin-bottom: 14px;
    }
    .mode-tab {
      flex: 1; padding: 10px; border-radius: 10px; border: none;
      background: var(--card); color: var(--text-muted);
      font-size: 14px; font-weight: 600; cursor: pointer;
      box-shadow: var(--shadow); transition: all 0.2s;
    }
    .mode-tab.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    /* ===== 2カラムレイアウト ===== */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: start;
    }

    /* 左パネル */
    .left-panel {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* カテゴリタブ（横スクロール） */
    .cat-tabs-wrapper {
      position: relative;
      background: #f8f9ff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
    }
    .cat-scroll-btn {
      flex-shrink: 0;
      width: 28px; height: 36px;
      border: none; background: transparent;
      color: var(--primary); font-size: 16px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; border-radius: 6px;
      padding-bottom: 4px;
    }
    .cat-scroll-btn:hover { background: #ede9ff; }
    .cat-scroll-btn:disabled { opacity: 0.25; cursor: default; background: transparent; }
    .cat-tabs {
      display: flex;
      overflow-x: auto;
      flex: 1;
      padding: 6px 0 0;
      gap: 4px;
      scrollbar-width: thin;
      scrollbar-color: #c7b8f5 #f0f2f8;
    }
    .cat-tabs::-webkit-scrollbar { height: 4px; }
    .cat-tabs::-webkit-scrollbar-track { background: #f0f2f8; border-radius: 2px; }
    .cat-tabs::-webkit-scrollbar-thumb { background: #c7b8f5; border-radius: 2px; }
    .cat-tab {
      padding: 7px 12px; border-radius: 8px 8px 0 0;
      border: none; background: transparent;
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: all 0.15s; border-bottom: 2px solid transparent;
    }
    .cat-tab.active {
      color: var(--primary-dark);
      background: white;
      border-bottom: 2px solid var(--primary);
    }

    /* タグ一覧エリア */
    .tag-list-area {
      padding: 14px;
      min-height: 200px;
    }
    .cat-label {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 10px; font-weight: 600;
    }
    .tag-grid {
      display: flex; flex-wrap: wrap; gap: 8px;
    }

    .tag-btn {
      padding: 9px 15px;
      background: #f0f2f8;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 13px; color: var(--text);
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
      touch-action: none;
    }
    .tag-btn:hover {
      border-color: var(--primary);
      color: var(--primary-dark);
      background: #f0eeff;
    }
    .tag-btn.selected {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(102,126,234,0.35);
    }
    .tag-btn.style-selected {
      background: linear-gradient(135deg, #ff9800, #ff5722);
      color: white;
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(255,152,0,0.35);
    }

    /* 右パネル */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 選択済みエリア */
    .selected-panel {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .selected-panel h3 {
      font-size: 12px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 12px; font-weight: 600;
    }

    .selected-drop-zone {
      min-height: 120px;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-content: flex-start;
      transition: all 0.2s;
      background: #fafbff;
    }
    .selected-drop-zone.drag-over {
      border-color: var(--primary);
      background: #f0eeff;
    }
    .selected-drop-zone.empty-hint {
      align-items: center;
      justify-content: center;
    }
    .drop-hint-text {
      color: #ccc; font-size: 12px; text-align: center;
      line-height: 1.7;
    }

    .selected-tag-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white; border-radius: 20px; font-size: 12px;
      cursor: pointer; transition: opacity 0.2s;
      animation: popIn 0.18s ease;
    }
    .selected-tag-chip.style-chip {
      background: linear-gradient(135deg, #ff9800, #ff5722);
    }
    .selected-tag-chip:hover { opacity: 0.8; }
    .selected-tag-chip .cat-badge {
      font-size: 10px; opacity: 0.75; font-weight: 400;
    }
    .selected-tag-chip .remove-x { font-size: 14px; opacity: 0.8; }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* アクションパネル */
    .action-panel {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    #countText {
      font-size: 12px; color: var(--text-muted);
      text-align: center; margin-bottom: 10px;
    }
    .action-btns {
      display: flex; flex-direction: column; gap: 8px;
    }
    .btn-generate {
      padding: 13px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.3px;
    }
    .btn-generate:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(102,126,234,0.4); }
    .btn-generate:active { transform: translateY(0); }

    .btn-row { display: flex; gap: 8px; }
    .btn-sub {
      flex: 1; padding: 10px;
      background: #f0f2f8; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 13px; font-weight: 600;
      color: var(--text); cursor: pointer; transition: all 0.15s;
    }
    .btn-sub:hover { background: #e8eaf6; border-color: var(--primary); color: var(--primary-dark); }

    /* ===== 結果エリア ===== */
    .result-section { margin-top: 16px; }
    #loading {
      display: none; text-align: center; padding: 24px;
      color: var(--primary); font-size: 14px; font-weight: 600;
    }
    .result-card {
      display: none;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px; text-align: center;
    }
    .result-card img {
      width: 100%; max-width: 320px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    #save-btn {
      display: none; margin-top: 14px;
      padding: 11px 28px;
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: white; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.2s;
    }
    #save-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ===== スワイプモード ===== */
    #swipeMode { display: none; }
    .swipe-cat-tabs {
      display: flex; gap: 6px; overflow-x: auto;
      padding-bottom: 5px; margin-bottom: 12px; scrollbar-width: none;
    }
    .swipe-cat-tabs::-webkit-scrollbar { display: none; }
    .swipe-cat-tab {
      padding: 7px 14px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--card);
      color: #666; font-size: 12px; font-weight: 600; cursor: pointer;
      white-space: nowrap; flex-shrink: 0; transition: all 0.15s;
    }
    .swipe-cat-tab.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white; border-color: transparent;
    }
    .swipe-container { text-align: center; }
    .card-stack { position: relative; height: 220px; margin: 0 auto 16px; width: 200px; }
    .swipe-card {
      position: absolute; inset: 0;
      background: white; border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: grab; transition: box-shadow 0.2s;
      user-select: none;
    }
    .swipe-card.top { z-index: 3; }
    .like-overlay, .nope-overlay {
      position: absolute; top: 16px;
      font-size: 13px; font-weight: 800;
      padding: 4px 12px; border-radius: 8px;
      opacity: 0; pointer-events: none;
    }
    .like-overlay { right: 16px; background: #4caf50; color: white; }
    .nope-overlay { left: 16px; background: #f44336; color: white; }
    .card-emoji { font-size: 56px; margin-bottom: 10px; }
    .card-label { font-size: 18px; font-weight: 700; color: var(--text); }
    .card-sublabel { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .swipe-hint {
      display: flex; justify-content: space-between;
      padding: 0 20px; margin-bottom: 12px;
    }
    .hint-left { color: #f44336; font-size: 13px; font-weight: 600; }
    .hint-right { color: #4caf50; font-size: 13px; font-weight: 600; }
    .swipe-btns { display: flex; justify-content: center; gap: 24px; }
    .btn-skip, .btn-add {
      width: 56px; height: 56px; border-radius: 50%;
      border: none; font-size: 22px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      transition: all 0.15s;
    }
    .btn-skip { background: white; color: #f44336; }
    .btn-add { background: linear-gradient(135deg, #4caf50, #43e97b); color: white; }
    .btn-skip:hover { transform: scale(1.08); }
    .btn-add:hover { transform: scale(1.08); }

    /* ===== ドラッグゴースト ===== */
    #dragGhost {
      position: fixed; pointer-events: none; z-index: 9999;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white; padding: 8px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
      box-shadow: 0 4px 14px rgba(102,126,234,0.4);
      display: none; transform: translate(-50%, -50%);
    }

    /* ===== レスポンシブ（スマホ） ===== */
    @media (max-width: 600px) {
      .two-col {
        grid-template-columns: 1fr;
      }
      .right-panel {
        order: -1; /* スマホでは右パネルを上に */
      }
      .selected-drop-zone { min-height: 80px; }
      .cat-tab { font-size: 11px; padding: 6px 10px; }
    }
  </style>
</head>

<!-- ヘッダー -->

  <div class="auth-area" id="authArea">
    <input type="email" id="emailInput" placeholder="メール">
    <input type="password" id="passInput" placeholder="パスワード">

    <button onclick="signup()">登録</button>
  </div>
  <div id="userInfo" style="display:none;align-items:center;gap:8px;">
    <span id="userEmail"></span>
    <button onclick="location.href='history.html'" style="background:rgba(255,255,255,0.25);">📷 履歴</button>
    <button onclick="logout()">ログアウト</button>
  </div>
</div>

<div class="main-container">

  <!-- モード切替 -->
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('drag')">🏷️ タグ選択</button>
    <button class="mode-tab" onclick="switchMode('swipe')">👆 スワイプ</button>
  </div>

  <!-- ===== タグ選択モード（2カラム） ===== -->
  <div id="dragMode">
    <div class="two-col">

      <!-- 左：カテゴリタブ＋タグ一覧 -->
      <div class="left-panel">
        <div class="cat-tabs-wrapper" id="catTabsWrapper">
          <button class="cat-scroll-btn" id="catScrollLeft" onclick="scrollTabs(-1)" disabled>‹</button>
          <div class="cat-tabs" id="catTabs"></div>
          <button class="cat-scroll-btn" id="catScrollRight" onclick="scrollTabs(1)">›</button>
        </div>
        <div class="tag-list-area" id="tagListArea"></div>
      </div>

      <!-- 右：選択済み＋アクション -->
      <div class="right-panel">

        <div class="selected-panel">
          <h3>✅ 選択中のタグ</h3>
          <div class="selected-drop-zone empty-hint" id="selectedDropZone">
            <div class="drop-hint-text">タグをここにドロップ<br>またはタップで選択</div>
          </div>
        </div>

        <div class="action-panel">
          <p id="countText">本日の残り回数：3回</p>
          <div class="action-btns">
            <button class="btn-generate" onclick="generate()">✨ 生成する</button>
            <div class="btn-row">
              <button class="btn-sub" onclick="randomGenerate()">🎲 ランダム</button>
              <button class="btn-sub" onclick="resetAll()">🔄 リセット</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ===== スワイプモード ===== -->
  <div id="swipeMode">
    <div class="swipe-cat-tabs" id="swipeCatTabs"></div>
    <div class="swipe-container">
      <div class="card-stack" id="cardStack"></div>
      <div class="swipe-hint">
        <span class="hint-left">← スキップ</span>
        <span class="hint-right">追加 →</span>
      </div>
      <div class="swipe-btns">
        <button class="btn-skip" onclick="swipeLeft()">✕</button>
        <button class="btn-add" onclick="swipeRight()">♥</button>
      </div>
    </div>

    <!-- スワイプモードでも選択済みを表示 -->
    <div class="selected-panel" style="margin-top:12px;">
      <h3>✅ 選択中のタグ</h3>
      <div class="selected-drop-zone empty-hint" id="selectedDropZoneSwipe">
        <div class="drop-hint-text">タグを選んでください</div>
      </div>
    </div>

    <div class="action-panel" style="margin-top:10px;">
      <p id="countTextSwipe">本日の残り回数：3回</p>
      <div class="action-btns">
        <button class="btn-generate" onclick="generate()">✨ 生成する</button>
        <div class="btn-row">
          <button class="btn-sub" onclick="randomGenerate()">🎲 ランダム</button>
          <button class="btn-sub" onclick="resetAll()">🔄 リセット</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 生成結果 -->
  <div class="result-section">
    <div id="loading">⏳ 生成中...（20〜30秒かかります）</div>
    <div class="result-card" id="resultCard">
      <img id="img">
      <br>
      <button id="save-btn" onclick="saveImage()">💾 画像を保存する</button>
    </div>
  </div>

</div>

<!-- ドラッグゴースト -->
<div id="dragGhost"></div>

const catLabels = {
  gender:"👤 性別", age:"🎂 年齢感", body:"💪 体型",
  hair:"💇 髪型", color:"🎨 髪色", face:"😊 表情",
  eyes:"👁️ 瞳", attr:"✨ 属性", outfit:"👗 服装",
  acc:"👓 アクセ", pose:"🤸 ポーズ", bg:"🖼️ 背景",
  style:"🎨 スタイル"
};

let currentCat = "gender"; // 左パネルで現在表示中のカテゴリ

// ===== 初期化 =====
function init() {
  buildCatTabs();
  renderTagList("gender");
  initDragDrop();
  initSwipe();

  // タブの左右ボタン制御
  const tabs = document.getElementById("catTabs");
  if (tabs) {
    tabs.addEventListener("scroll", updateScrollBtns);
    setTimeout(updateScrollBtns, 100);
  }
}

// ===== タブ左右スクロール =====
function scrollTabs(dir) {
  const tabs = document.getElementById("catTabs");
  if (tabs) {
    tabs.scrollBy({ left: dir * 120, behavior: "smooth" });
    setTimeout(updateScrollBtns, 320);
  }
}

function updateScrollBtns() {
  const tabs = document.getElementById("catTabs");
  const btnL = document.getElementById("catScrollLeft");
  const btnR = document.getElementById("catScrollRight");
  if (!tabs || !btnL || !btnR) return;
  btnL.disabled = tabs.scrollLeft <= 0;
  btnR.disabled = tabs.scrollLeft + tabs.clientWidth >= tabs.scrollWidth - 4;
}

// ===== カテゴリタブ構築 =====
function buildCatTabs() {
  const tabs = document.getElementById("catTabs");
  tabs.innerHTML = Object.keys(allTags).map((key, i) =>
    `<button class="cat-tab ${i===0?'active':''}" onclick="switchCat('${key}')">${catLabels[key]}</button>`
  ).join("");
}

function switchCat(cat) {
  currentCat = cat;
  document.querySelectorAll(".cat-tab").forEach((t, i) =>
    t.classList.toggle("active", Object.keys(allTags)[i] === cat)
  );
  renderTagList(cat);
}

// ===== タグ一覧レンダリング =====
function renderTagList(cat) {
  const area = document.getElementById("tagListArea");
  const tags = allTags[cat];
  const isStyle = cat === "style";

  const html = `
    <div class="cat-label">${catLabels[cat]}</div>
    <div class="tag-grid" id="tagGrid">
      ${tags.map(t => {
        const isSelected = isStyle
          ? selectedStyle === t.tag
          : selected[cat] === t.tag;
        const cls = isSelected ? (isStyle ? "tag-btn style-selected" : "tag-btn selected") : "tag-btn";
        return `<button
          class="${cls}"
          data-tag="${t.tag}"
          data-cat="${cat}"
          data-isstyle="${isStyle}"
          onclick="tapSelect('${cat}','${t.tag}',${isStyle})"
          draggable="false"
        >${t.label}</button>`;
      }).join("")}
    </div>
  `;
  area.innerHTML = html;

  // ドラッグイベント再設定
  area.querySelectorAll(".tag-btn").forEach(btn => {
    btn.addEventListener("mousedown", onDragStart);
    btn.addEventListener("touchstart", onTouchStart, {passive: false});
  });
}

// ===== タップ選択 =====
function tapSelect(cat, tag, isStyle) {
  if (isStyle) {
    selectedStyle = selectedStyle === tag ? "" : tag;
  } else {
    if (selected[cat] === tag) {
      delete selected[cat];
    } else {
      selected[cat] = tag;
    }
  }
  renderTagList(cat);
  renderSelectedZone();
}

// ===== 選択済みゾーン描画 =====
function renderSelectedZone() {
  const zones = ["selectedDropZone", "selectedDropZoneSwipe"];
  zones.forEach(zoneId => {
    const zone = document.getElementById(zoneId);
    if (!zone) return;

    let chips = [];
    for (let cat in selected) {
      const tag = selected[cat];
      const label = getLabelByTag(tag);
      chips.push(`<div class="selected-tag-chip" onclick="removeSelected('${cat}','${tag}',false)">
        <span class="cat-badge">${catLabels[cat].split(" ")[0]}</span>
        ${label}
        <span class="remove-x">×</span>
      </div>`);
    }
    if (selectedStyle) {
      const label = getLabelByTag(selectedStyle);
      chips.push(`<div class="selected-tag-chip style-chip" onclick="removeSelected('style','${selectedStyle}',true)">
        <span class="cat-badge">🎨</span>
        ${label}
        <span class="remove-x">×</span>
      </div>`);
    }

    if (chips.length === 0) {
      zone.classList.add("empty-hint");
      zone.innerHTML = '<div class="drop-hint-text">タグをここにドロップ<br>またはタップで選択</div>';
    } else {
      zone.classList.remove("empty-hint");
      zone.innerHTML = chips.join("");
    }
  });
}

function removeSelected(cat, tag, isStyle) {
  if (isStyle) selectedStyle = "";
  else delete selected[cat];
  renderTagList(currentCat);
  renderSelectedZone();
}

function getLabelByTag(tag) {
  for (let cat in allTags) {
    const found = allTags[cat].find(t => t.tag === tag);
    if (found) return found.label;
  }
  return tag;
}

// ===== ドラッグ&ドロップ =====
let dragTag = null, dragCat = null, dragIsStyle = false;
let ghostEl;

function initDragDrop() {
  ghostEl = document.getElementById("dragGhost");

  const dropZone = document.getElementById("selectedDropZone");
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
  dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("drag-over"); commitDrop(); });
}

function onDragStart(e) {
  const btn = e.currentTarget;
  dragTag = btn.dataset.tag;
  dragCat = btn.dataset.cat;
  dragIsStyle = btn.dataset.isstyle === "true";

  ghostEl.textContent = btn.textContent.trim();
  ghostEl.style.display = "block";

  document.addEventListener("mousemove", onDragMove);
  document.addEventListener("mouseup", onDragEnd);
}

function onDragMove(e) {
  ghostEl.style.left = e.clientX + "px";
  ghostEl.style.top = e.clientY + "px";

  const zone = document.getElementById("selectedDropZone");
  const rect = zone.getBoundingClientRect();
  const over = e.clientX >= rect.left && e.clientX <= rect.right &&
                e.clientY >= rect.top && e.clientY <= rect.bottom;
  zone.classList.toggle("drag-over", over);
}

function onDragEnd(e) {
  ghostEl.style.display = "none";
  document.removeEventListener("mousemove", onDragMove);
  document.removeEventListener("mouseup", onDragEnd);

  const zone = document.getElementById("selectedDropZone");
  const rect = zone.getBoundingClientRect();
  if (e.clientX >= rect.left && e.clientX <= rect.right &&
      e.clientY >= rect.top && e.clientY <= rect.bottom) {
    zone.classList.remove("drag-over");
    commitDrop();
  }
  zone.classList.remove("drag-over");
}

// タッチ対応
function onTouchStart(e) {
  e.preventDefault();
  const btn = e.currentTarget;
  dragTag = btn.dataset.tag;
  dragCat = btn.dataset.cat;
  dragIsStyle = btn.dataset.isstyle === "true";

  ghostEl.textContent = btn.textContent.trim();
  ghostEl.style.display = "block";

  document.addEventListener("touchmove", onTouchMove, {passive:false});
  document.addEventListener("touchend", onTouchEnd);
}

function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  ghostEl.style.left = t.clientX + "px";
  ghostEl.style.top = t.clientY + "px";

  const zone = document.getElementById("selectedDropZone");
  const rect = zone.getBoundingClientRect();
  const over = t.clientX >= rect.left && t.clientX <= rect.right &&
                t.clientY >= rect.top && t.clientY <= rect.bottom;
  zone.classList.toggle("drag-over", over);
}

function onTouchEnd(e) {
  ghostEl.style.display = "none";
  document.removeEventListener("touchmove", onTouchMove);
  document.removeEventListener("touchend", onTouchEnd);

  const t = e.changedTouches[0];
  const zone = document.getElementById("selectedDropZone");
  const rect = zone.getBoundingClientRect();
  if (t.clientX >= rect.left && t.clientX <= rect.right &&
      t.clientY >= rect.top && t.clientY <= rect.bottom) {
    zone.classList.remove("drag-over");
    commitDrop();
  }
  zone.classList.remove("drag-over");
}

function commitDrop() {
  if (!dragTag) return;
  if (dragIsStyle) {
    selectedStyle = dragTag;
  } else {
    selected[dragCat] = dragTag;
  }
  renderTagList(currentCat);
  renderSelectedZone();
  dragTag = null; dragCat = null;
}

// ===== スワイプモード =====
let swipeCatKeys = Object.keys(allTags);
let swipeCatIndex = 0;
let swipeCardIndex = 0;

function initSwipe() {
  const tabHtml = swipeCatKeys.map((key, i) =>
    `<button class="swipe-cat-tab ${i===0?'active':''}" onclick="loadSwipeCat(${i})">${catLabels[key]}</button>`
  ).join("");
  document.getElementById("swipeCatTabs").innerHTML = tabHtml;
  loadSwipeCat(0);
}

function loadSwipeCat(index) {
  swipeCatIndex = index;
  swipeCardIndex = 0;
  document.querySelectorAll(".swipe-cat-tab").forEach((t, i) => t.classList.toggle("active", i === index));
  renderSwipeCards();
}

function getUnselectedCards() {
  const catKey = swipeCatKeys[swipeCatIndex];
  const cards = allTags[catKey];
  const already = catKey === "style" ? selectedStyle : selected[catKey];
  return cards.filter(c => c.tag !== already);
}

function renderSwipeCards() {
  const stack = document.getElementById("cardStack");
  const cards = getUnselectedCards();
  const remaining = cards.slice(swipeCardIndex, swipeCardIndex + 3);

  stack.innerHTML = "";
  if (remaining.length === 0) {
    const catKey = swipeCatKeys[swipeCatIndex];
    const current = catKey === "style" ? selectedStyle : selected[catKey];
    stack.innerHTML = `<div style="text-align:center;padding:60px 0;color:#aaa;font-size:14px">
      ${current ? '✅ ' + getLabelByTag(current) : '✅ 完了！'}<br>次のカテゴリーへ
    </div>`;
    return;
  }

  [...remaining].reverse().forEach((card, i) => {
    const isTop = i === remaining.length - 1;
    const div = document.createElement("div");
    div.className = "swipe-card" + (isTop ? " top" : "");
    div.innerHTML = `
      <div class="like-overlay">追加！</div>
      <div class="nope-overlay">スキップ</div>
      <div class="card-emoji">${getEmoji(card.tag)}</div>
      <div class="card-label">${card.label}</div>
      <div class="card-sublabel">${card.tag}</div>
    `;
    if (isTop) setupSwipeDrag(div, card);
    stack.appendChild(div);
  });
}

function getEmoji(tag) {
  // タグのlabelからemojiを取得
  for (let cat in allTags) {
    const found = allTags[cat].find(t => t.tag === tag);
    if (found) {
      const match = found.label.match(/^(\S+)/);
      if (match) return match[1];
    }
  }
  return "✨";
}

function setupSwipeDrag(el, card) {
  let startX = 0, isDragging = false;
  function onStart(x) { startX = x; isDragging = true; }
  function onMove(x) {
    if (!isDragging) return;
    const d = x - startX;
    el.style.transform = `translateX(${d}px) rotate(${d*0.05}deg)`;
    el.querySelector(".like-overlay").style.opacity = d > 30 ? Math.min(d/100,1) : 0;
    el.querySelector(".nope-overlay").style.opacity = d < -30 ? Math.min(-d/100,1) : 0;
  }
  function onEnd(x) {
    if (!isDragging) return;
    isDragging = false;
    const d = x - startX;
    el.style.transform = "";
    el.querySelector(".like-overlay").style.opacity = 0;
    el.querySelector(".nope-overlay").style.opacity = 0;
    if (d > 60) doSwipeRight(card);
    else if (d < -60) doSwipeLeft();
  }
  el.addEventListener("mousedown", e => onStart(e.clientX));
  document.addEventListener("mousemove", e => onMove(e.clientX));
  document.addEventListener("mouseup", e => onEnd(e.clientX));
  el.addEventListener("touchstart", e => onStart(e.touches[0].clientX), {passive:true});
  el.addEventListener("touchmove", e => onMove(e.touches[0].clientX), {passive:true});
  el.addEventListener("touchend", e => onEnd(e.changedTouches[0].clientX));
}

function doSwipeLeft() {
  swipeCardIndex++;
  const cards = getUnselectedCards();
  // スキップでカード全部なくなったら次のカテゴリへ
  if (swipeCardIndex >= cards.length) {
    autoNextCat();
  } else {
    renderSwipeCards();
  }
}

function doSwipeRight(card) {
  const catKey = swipeCatKeys[swipeCatIndex];
  if (catKey === "style") selectedStyle = card.tag;
  else selected[catKey] = card.tag;
  swipeCardIndex++;
  renderSelectedZone();
  // 選択した瞬間に次のカテゴリへ自動移動
  autoNextCat();
}

function autoNextCat() {
  const nextIndex = swipeCatIndex + 1;
  if (nextIndex < swipeCatKeys.length) {
    // カードがアニメで消えるのを少し待ってから移動
    setTimeout(() => loadSwipeCat(nextIndex), 300);
  } else {
    // 全カテゴリ完了
    renderSwipeCards();
  }
}
function swipeLeft() {
  const cards = getUnselectedCards();
  if (swipeCardIndex < cards.length) doSwipeLeft();
}
function swipeRight() {
  const cards = getUnselectedCards();
  if (swipeCardIndex < cards.length) doSwipeRight(cards[swipeCardIndex]);
}

// ===== モード切替 =====
function switchMode(mode) {
  document.getElementById("dragMode").style.display = mode === "drag" ? "block" : "none";
  document.getElementById("swipeMode").style.display = mode === "swipe" ? "block" : "none";
  document.querySelectorAll(".mode-tab").forEach((t, i) =>
    t.classList.toggle("active", (i === 0) === (mode === "drag"))
  );
}

// ===== ランダム・リセット =====
function randomGenerate() {
  selected = {}; selectedStyle = "";
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  ["gender","hair","color","face"].forEach(cat => { selected[cat] = pick(allTags[cat]).tag; });
  if (Math.random() > 0.5) selected.attr = pick(allTags.attr).tag;
  selectedStyle = pick(allTags.style).tag;
  renderTagList(currentCat);
  renderSelectedZone();
}

function resetAll() {
  selected = {}; selectedStyle = "";
  renderTagList(currentCat);
  renderSelectedZone();
  document.getElementById("resultCard").style.display = "none";
  document.getElementById("loading").style.display = "none";
  document.getElementById("save-btn").style.display = "none";
}

// ===== 生成 =====
async function generate() {
  if (!currentUser) { alert("ログインしてください"); return; }
  const today = new Date().toISOString().split("T")[0];
  const { data } = await sb.from("usage").select("count").eq("user_id", currentUser.id).eq("date", today).single();
  const count = data ? data.count : 0;
  const limit = currentUser.email === "amekaze.shinogin@gmail.com" ? 9999 : 3;

  if (count >= limit) { alert("本日の無料生成回数（" + limit + "回）を超えました。"); return; }
  if (Object.keys(selected).length === 0 && !selectedStyle) { alert("タグを選択してください"); return; }

  const tags = Object.values(selected).join(", ");
  const style = selectedStyle || "anime style";
  const workerUrl = "https://imagi-api.amekaze-shinogin.workers.dev/?prompt=" + encodeURIComponent(tags) + "&style=" + encodeURIComponent(style);

  document.getElementById("loading").style.display = "block";
  document.getElementById("resultCard").style.display = "none";

  try {
    // WorkerからJSONでStorageURLを受け取る
    const res = await fetch(workerUrl);
    const json = await res.json();
    const storageUrl = json.url;

    if (!storageUrl) throw new Error("URLが取得できませんでした");

    // 生成成功後に回数をカウント
    if (data) await sb.from("usage").update({count: count+1}).eq("user_id", currentUser.id).eq("date", today);
    else await sb.from("usage").insert({user_id: currentUser.id, date: today, count: 1});

    const remaining = limit - count - 1;
    document.getElementById("countText").innerText = "本日の残り回数：" + remaining + "回";
    document.getElementById("countTextSwipe").innerText = "本日の残り回数：" + remaining + "回";

    const img = document.getElementById("img");
    img.onload = async () => {
      document.getElementById("loading").style.display = "none";
      document.getElementById("resultCard").style.display = "block";
      document.getElementById("save-btn").style.display = "inline-block";
      img.scrollIntoView({behavior:"smooth"});

      // 自動保存（Storage URLをhistoryテーブルへ）
      await sb.from("history").insert({
        user_id: currentUser.id,
        image_url: storageUrl,
        tags: selected,
        style: style
      });
    };
    img.onerror = () => {
      document.getElementById("loading").style.display = "none";
      alert("画像の表示に失敗しました。もう一度お試しください。");
    };
    img.src = storageUrl;

  } catch(e) {
    document.getElementById("loading").style.display = "none";
    alert("生成に失敗しました。もう一度お試しください。\n詳細: " + e.message);
  }
}

function saveImage() {
  const a = document.createElement("a");
  a.href = document.getElementById("img").src;
  a.download = "icon.jpg"; a.click();
}

// ===== 認証 =====
async function login() {
  const email = document.getElementById("emailInput").value;
  const pass = document.getElementById("passInput").value;
  const { data, error } = await sb.auth.signInWithPassword({email, password: pass});
  if (error) alert("ログイン失敗: " + error.message);
}
async function signup() {
  const email = document.getElementById("emailInput").value;
  const pass = document.getElementById("passInput").value;
  const { data, error } = await sb.auth.signUp({email, password: pass});
  if (error) alert("登録失敗: " + error.message);
  else alert("確認メールを送りました！");
}
async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  updateAuthUI();
}
function updateAuthUI() {
  if (currentUser) {
    document.getElementById("authArea").style.display = "none";
    document.getElementById("userInfo").style.display = "flex";
    document.getElementById("userEmail").textContent = currentUser.email;
    loadCount();
  } else {
    document.getElementById("authArea").style.display = "flex";
    document.getElementById("userInfo").style.display = "none";
  }
}
async function loadCount() {
  const today = new Date().toISOString().split("T")[0];
  const { data } = await sb.from("usage").select("count").eq("user_id", currentUser.id).eq("date", today).single();
  const count = data ? data.count : 0;
  const r = 3 - count;
  document.getElementById("countText").innerText = "本日の残り回数：" + r + "回";
  document.getElementById("countTextSwipe").innerText = "本日の残り回数：" + r + "回";
}

sb.auth.getSession().then(({data}) => {
  if (data.session) { currentUser = data.session.user; updateAuthUI(); }
});
sb.auth.onAuthStateChange((event, session) => {
  currentUser = session ? session.user : null;
  updateAuthUI();
});

// 初期化実行
init();
