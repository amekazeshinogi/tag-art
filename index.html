<!DOCTYPE html>
<html>
<head>

<title>アイコン生成AI</title>

<style>

button {
margin:4px;
padding:8px;
}

.category {
margin-top:10px;
}

.tag {
background:#ddd;
display:inline-block;
padding:5px;
margin:3px;
cursor:pointer;
}

.selected {
background:orange;
color:white;
}

img {
width:256px;
height:256px;
margin-top:20px;
}

</style>

</head>
<body>

<h2>アイコン生成AI</h2>

<div class="category">
<h3>性別</h3>
<button onclick="addTag('boy')">男</button>
<button onclick="addTag('girl')">女</button>
</div>

<div class="category">
<h3>表情</h3>
<button onclick="addTag('smile')">笑顔</button>
<button onclick="addTag('angry')">怒り</button>
<button onclick="addTag('sad')">悲しい</button>
</div>

<div class="category">
<h3>アクセ</h3>
<button onclick="addTag('glasses')">メガネ</button>
<button onclick="addTag('hat')">帽子</button>
<button onclick="addTag('earrings')">ピアス</button>
</div>

<div class="category">
<h3>スタイル</h3>
<button onclick="setStyle(this,'cute icon')">かわいい</button>
<button onclick="setStyle(this,'simple flat icon')">シンプル</button>
<button onclick="setStyle(this,'soft illustration')">ゆるい</button>
<button onclick="setStyle(this,'business avatar')">ビジネス</button>
</div>

<h3>選択タグ（クリックで削除）</h3>
<div id="tagList"></div>

<p id="styleText">スタイル: 未選択</p>

<button onclick="resetTags()">リセット</button>
<button onclick="generate()">生成</button>

<br>

<img id="img" style="display:none">

<script>

function generate(){
  // 回数制限チェック
  let today = new Date().toDateString();
  let data = JSON.parse(localStorage.getItem("genData") || '{"date":"","count":0}');

  if(data.date !== today){
    data = { date: today, count: 0 };
  }

  let limit = 3; // 無料回数

  if(data.count >= limit){
    alert("本日の無料生成回数（" + limit + "回）を超えました。\n有料プランにアップグレードしてください。");
    return;
  }

  if(tags.length === 0 && style === ""){
    alert("タグまたはスタイルを選択してください");
    return;
  }

  data.count++;
  localStorage.setItem("genData", JSON.stringify(data));

  let remaining = limit - data.count;
  document.getElementById("countText").innerText = "本日の残り回数：" + remaining + "回";

  let prompt = tags.join(", ");

  let url =
    "https://imagi-api.amekaze-shinogin.workers.dev/?prompt="
    + encodeURIComponent(prompt)
    + "&style="
    + encodeURIComponent(style);

  let img = document.getElementById("img");
  img.style.display="block";
  img.src = url;
}

</script>

</body>
</html>
