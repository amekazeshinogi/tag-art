<!DOCTYPE html>
<html>
<head>

<title>🎨 アイコン生成AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Helvetica Neue', sans-serif;
  background: #f0f2f5;
  color: #333;
  padding-bottom: 40px;
}

header {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 20px;
  text-align: center;
}

header h1 { font-size: 24px; margin-bottom: 5px; }
header p { font-size: 13px; opacity: 0.85; }

#auth-bar {
  background: white;
  padding: 10px 15px;
  text-align: right;
  font-size: 13px;
  color: #666;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

#auth-bar button {
  margin-left: 8px;
  padding: 6px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}

#login-btn { background: #667eea; color: white; }
#logout-btn { background: #e44; color: white; display: none; }

.container {
  max-width: 620px;
  margin: 20px auto;
  padding: 0 15px;
}

/* ログインモーダル */
#modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  justify-content: center;
  align-items: center;
}

#modal.show { display: flex; }

.modal-box {
  background: white;
  border-radius: 16px;
  padding: 30px;
  width: 90%;
  max-width: 400px;
}

.modal-box h2 { margin-bottom: 20px; text-align: center; color: #333; }

.modal-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
}

.modal-box button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  margin-bottom: 8px;
}

#do-login { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
#do-signup { background: #f0f2f5; color: #333; }
#close-modal { background: white; color: #999; }

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card h3 {
  font-size: 14px;
  color: #888;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.tag-btn {
  margin: 4px;
  padding: 8px 14px;
  border: 1.5px solid #ddd;
  border-radius: 20px;
  background: white;
  color: #333;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}

.tag-btn:hover { border-color: #764ba2; color: #764ba2; }

.tag-btn.selected {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border-color: transparent;
}

.selected-area {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  min-height: 60px;
}

.selected-area h3 {
  font-size: 14px;
  color: #888;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.tag {
  display: inline-block;
  background: #f0f2f5;
  color: #333;
  padding: 6px 12px;
  margin: 3px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
}

.tag:hover { background: #fde8e8; color: #e44; }

#countText {
  text-align: center;
  color: #764ba2;
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 10px;
}

.btn-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

#reset-btn {
  flex: 1;
  padding: 14px;
  background: #f0f2f5;
  color: #666;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
}

#generate-btn {
  flex: 2;
  padding: 14px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

#loading {
  display: none;
  text-align: center;
  padding: 30px;
  color: #888;
  font-size: 15px;
}

.result-card {
  display: none;
  background: white;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

#img {
  width: 256px;
  height: 256px;
  border-radius: 12px;
  display: block;
  margin: 0 auto 15px;
}

#save-btn {
  display: none;
  padding: 12px 30px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  width: 100%;
}

</style>
</head>
<body>

<header>
  <h1>🎨 アイコン生成AI</h1>
  <p>タグを選んでオリジナルアイコンを作ろう</p>
</header>

<div id="auth-bar">
  <span id="user-email"></span>
  <button id="login-btn" onclick="showModal()">ログイン / 新規登録</button>
  <button id="logout-btn" onclick="logout()">ログアウト</button>
</div>

<!-- ログインモーダル -->
<div id="modal">
  <div class="modal-box">
    <h2>🔐 ログイン / 新規登録</h2>
    <input type="email" id="email-input" placeholder="メールアドレス">
    <input type="password" id="password-input" placeholder="パスワード（6文字以上）">
    <button id="do-login" onclick="login()">ログイン</button>
    <button id="do-signup" onclick="signup()">新規登録</button>
    <button id="close-modal" onclick="hideModal()">キャンセル</button>
    <p id="auth-msg" style="text-align:center;color:#e44;font-size:13px;margin-top:8px"></p>
  </div>
</div>

<div class="container">

<div class="card">
<h3>👤 性別</h3>
<button class="tag-btn" onclick="addTag('boy')">男性</button>
<button class="tag-btn" onclick="addTag('girl')">女性</button>
<button class="tag-btn" onclick="addTag('neutral')">中性</button>
</div>

<div class="card">
<h3>💇 髪型</h3>
<button class="tag-btn" onclick="addTag('short hair')">ショート</button>
<button class="tag-btn" onclick="addTag('long hair')">ロング</button>
<button class="tag-btn" onclick="addTag('twin tails')">ツインテール</button>
<button class="tag-btn" onclick="addTag('ponytail')">ポニーテール</button>
<button class="tag-btn" onclick="addTag('bob cut')">ボブ</button>
<button class="tag-btn" onclick="addTag('wavy hair')">ウェーブ</button>
<button class="tag-btn" onclick="addTag('curly hair')">くるくる</button>
</div>

<div class="card">
<h3>🎨 髪色</h3>
<button class="tag-btn" onclick="addTag('blonde hair')">金髪</button>
<button class="tag-btn" onclick="addTag('black hair')">黒髪</button>
<button class="tag-btn" onclick="addTag('brown hair')">茶髪</button>
<button class="tag-btn" onclick="addTag('white hair')">白髪</button>
<button class="tag-btn" onclick="addTag('pink hair')">ピンク</button>
<button class="tag-btn" onclick="addTag('blue hair')">ブルー</button>
<button class="tag-btn" onclick="addTag('silver hair')">シルバー</button>
</div>

<div class="card">
<h3>😊 表情</h3>
<button class="tag-btn" onclick="addTag('smile')">笑顔</button>
<button class="tag-btn" onclick="addTag('serious')">真剣</button>
<button class="tag-btn" onclick="addTag('wink')">ウィンク</button>
<button class="tag-btn" onclick="addTag('surprised')">驚き</button>
<button class="tag-btn" onclick="addTag('cool expression')">クール</button>
<button class="tag-btn" onclick="addTag('happy')">嬉しい</button>
</div>

<div class="card">
<h3>👁️ 目</h3>
<button class="tag-btn" onclick="addTag('big eyes')">大きい目</button>
<button class="tag-btn" onclick="addTag('blue eyes')">青い目</button>
<button class="tag-btn" onclick="addTag('red eyes')">赤い目</button>
<button class="tag-btn" onclick="addTag('green eyes')">緑の目</button>
<button class="tag-btn" onclick="addTag('heterochromia')">オッドアイ</button>
</div>

<div class="card">
<h3>👗 服装</h3>
<button class="tag-btn" onclick="addTag('school uniform')">制服</button>
<button class="tag-btn" onclick="addTag('casual clothes')">カジュアル</button>
<button class="tag-btn" onclick="addTag('suit')">スーツ</button>
<button class="tag-btn" onclick="addTag('kimono')">着物</button>
<button class="tag-btn" onclick="addTag('hoodie')">パーカー</button>
<button class="tag-btn" onclick="addTag('maid outfit')">メイド服</button>
</div>

<div class="card">
<h3>✨ 属性</h3>
<button class="tag-btn" onclick="addTag('cat ears')">猫耳</button>
<button class="tag-btn" onclick="addTag('fox ears')">狐耳</button>
<button class="tag-btn" onclick="addTag('angel wings')">天使</button>
<button class="tag-btn" onclick="addTag('demon horns')">悪魔</button>
<button class="tag-btn" onclick="addTag('elf ears')">エルフ</button>
<button class="tag-btn" onclick="addTag('dragon')">ドラゴン</button>
</div>

<div class="card">
<h3>👓 アクセサリー</h3>
<button class="tag-btn" onclick="addTag('glasses')">メガネ</button>
<button class="tag-btn" onclick="addTag('hat')">帽子</button>
<button class="tag-btn" onclick="addTag('earrings')">ピアス</button>
<button class="tag-btn" onclick="addTag('headband')">カチューシャ</button>
<button class="tag-btn" onclick="addTag('ribbon')">リボン</button>
<button class="tag-btn" onclick="addTag('mask')">マスク</button>
</div>

<div class="card">
<h3>🌍 背景・世界観</h3>
<button class="tag-btn" onclick="addTag('fantasy background')">ファンタジー</button>
<button class="tag-btn" onclick="addTag('cyberpunk background')">サイバーパンク</button>
<button class="tag-btn" onclick="addTag('nature background')">自然</button>
<button class="tag-btn" onclick="addTag('white background')">白背景</button>
<button class="tag-btn" onclick="addTag('gradient background')">グラデーション</button>
</div>

<div class="card">
<h3>🎨 スタイル</h3>
<button class="tag-btn" onclick="setStyle(this,'cute icon')">かわいい</button>
<button class="tag-btn" onclick="setStyle(this,'simple flat icon')">シンプル</button>
<button class="tag-btn" onclick="setStyle(this,'soft illustration')">ゆるい</button>
<button class="tag-btn" onclick="setStyle(this,'business avatar')">ビジネス</button>
<button class="tag-btn" onclick="setStyle(this,'pixel art')">ドット絵</button>
<button class="tag-btn" onclick="setStyle(this,'anime style')">アニメ</button>
<button class="tag-btn" onclick="setStyle(this,'realistic')">リアル</button>
</div>

<div class="selected-area">
<h3>選択中タグ（タップで削除）</h3>
<div id="tagList"><span style="color:#aaa;font-size:13px">タグを選んでください</span></div>
<p style="margin-top:8px;font-size:13px;color:#888" id="styleText">スタイル: 未選択</p>
</div>

<p id="countText">本日の残り回数：3回</p>

<div class="btn-row">
<button id="reset-btn" onclick="resetTags()">🔄 リセット</button>
<button id="generate-btn" onclick="generate()">✨ 生成する</button>
</div>

<div id="loading">⏳ 生成中...（20〜30秒かかります）</div>

<div class="result-card" id="resultCard">
<img id="img">
<button id="save-btn" onclick="saveImage()">💾 画像を保存する</button>
</div>

</div>

<script>

const SUPABASE_URL = "https://eoademoyfyopqfnljhyf.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvYWRlbW95ZnlvcHFmbmxqaHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTIyODIsImV4cCI6MjA4OTA2ODI4Mn0.EXk-W1fcaZ8g_b2avAjMIzOJhszdAUWssbivZhCyPFs";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let tags = [];
let style = "";
let currentUser = null;

// 起動時にログイン状態確認
sb.auth.getSession().then(({ data }) => {
  if (data.session) {
    currentUser = data.session.user;
    updateAuthUI();
  }
});

sb.auth.onAuthStateChange((event, session) => {
  currentUser = session ? session.user : null;
  updateAuthUI();
});

function updateAuthUI() {
  if (currentUser) {
    document.getElementById("user-email").innerText = currentUser.email;
    document.getElementById("login-btn").style.display = "none";
    document.getElementById("logout-btn").style.display = "inline-block";
  } else {
    document.getElementById("user-email").innerText = "";
    document.getElementById("login-btn").style.display = "inline-block";
    document.getElementById("logout-btn").style.display = "none";
  }
}

function showModal() {
  document.getElementById("modal").classList.add("show");
}

function hideModal() {
  document.getElementById("modal").classList.remove("show");
  document.getElementById("auth-msg").innerText = "";
}

async function login() {
  let email = document.getElementById("email-input").value;
  let password = document.getElementById("password-input").value;
  let { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById("auth-msg").innerText = "ログイン失敗: " + error.message;
  } else {
    hideModal();
  }
}

async function signup() {
  let email = document.getElementById("email-input").value;
  let password = document.getElementById("password-input").value;
  let { error } = await sb.auth.signUp({ email, password });
  if (error) {
    document.getElementById("auth-msg").innerText = "登録失敗: " + error.message;
  } else {
    document.getElementById("auth-msg").style.color = "#4CAF50";
    document.getElementById("auth-msg").innerText = "登録完了！ログインしてください";
  }
}

async function logout() {
  await sb.auth.signOut();
}

function addTag(tag){
  tags.push(tag);
  showTags();
}

function removeTag(index){
  tags.splice(index,1);
  showTags();
}

function showTags(){
  let html="";
  for(let i=0;i<tags.length;i++){
    html += '<span class="tag" onclick="removeTag('+i+')">'
      + tags[i] + ' ×</span>';
  }
  document.getElementById("tagList").innerHTML =
    html || '<span style="color:#aaa;font-size:13px">タグを選んでください</span>';
}

function resetTags(){
  tags=[];
  style="";
  showTags();
  document.getElementById("styleText").innerText="スタイル: 未選択";
  let btns = document.querySelectorAll(".tag-btn");
  btns.forEach(b => b.classList.remove("selected"));
  document.getElementById("resultCard").style.display="none";
  document.getElementById("loading").style.display="none";
  document.getElementById("save-btn").style.display="none";
}

function setStyle(btn, s){
  style = s;
  document.getElementById("styleText").innerText = "スタイル: " + style;
  let btns = document.querySelectorAll(".tag-btn");
  btns.forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}

function saveImage(){
  let img = document.getElementById("img");
  let a = document.createElement("a");
  a.href = img.src;
  a.download = "icon.jpg";
  a.click();
}

async function generate(){

  // ログインチェック
  if (!currentUser) {
    alert("生成するにはログインが必要です。");
    showModal();
    return;
  }

  // 回数制限チェック（Supabaseで管理）
  let today = new Date().toISOString().split("T")[0];

  let { data, error } = await sb
    .from("usage")
    .select("count")
    .eq("user_id", currentUser.id)
    .eq("date", today)
    .single();

  let count = data ? data.count : 0;
  let limit = 3;

  if (count >= limit) {
    alert("本日の無料生成回数（" + limit + "回）を超えました。\n有料プランにアップグレードしてください。");
    return;
  }

  if(tags.length === 0 && style === ""){
    alert("タグまたはスタイルを選択してください");
    return;
  }

  // 回数を更新
  if (data) {
    await sb.from("usage").update({ count: count + 1 })
      .eq("user_id", currentUser.id).eq("date", today);
  } else {
    await sb.from("usage").insert({ user_id: currentUser.id, date: today, count: 1 });
  }

  let remaining = limit - (count + 1);
  document.getElementById("countText").innerText =
    "本日の残り回数：" + remaining + "回";

  let prompt = tags.join(", ");

  let url =
    "https://imagi-api.amekaze-shinogin.workers.dev/?prompt="
    + encodeURIComponent(prompt)
    + "&style="
    + encodeURIComponent(style);

  document.getElementById("loading").style.display="block";
  document.getElementById("resultCard").style.display="none";

  let img = document.getElementById("img");
  img.onload = function(){
    document.getElementById("loading").style.display="none";
    document.getElementById("resultCard").style.display="block";
    document.getElementById("save-btn").style.display="block";
  };
  img.onerror = function(){
    document.getElementById("loading").style.display="none";
    alert("生成に失敗しました。もう一度お試しください。");
  };
  img.src = url;
}

</script>

</body>
</html>
